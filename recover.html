<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세션 복구 — 네이버 내부링크 도우미</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #212529; }
    p { font-size: 13px; color: #868e96; line-height: 1.7; margin-bottom: 24px; }
    input {
      width: 100%;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      background: #03C75A;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { background: #adb5bd; cursor: not-allowed; }
    .msg { margin-top: 12px; font-size: 13px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🔑</div>
  <h1>세션 ID 복구</h1>
  <p>등록하신 이메일 주소를 입력하시면<br>세션 ID를 이메일로 보내드립니다.</p>
  <input type="email" id="emailInput" placeholder="이메일 주소 입력" />
  <button id="sendBtn" onclick="sendRecovery()">복구 이메일 받기</button>
  <div class="msg" id="msg"></div>
</div>
<script>
async function sendRecovery() {
  const email = document.getElementById('emailInput').value.trim();
  const btn = document.getElementById('sendBtn');
  const msg = document.getElementById('msg');
  if (!email || !email.includes('@')) {
    msg.style.display = 'block';
    msg.style.color = '#c0392b';
    msg.textContent = '유효한 이메일을 입력해주세요.';
    return;
  }
  btn.disabled = true;
  btn.textContent = '전송 중...';
  try {
    const res = await fetch('https://naver-linker.onrender.com/api/recover-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    msg.style.display = 'block';
    if (res.ok) {
      msg.style.color = '#087f3d';
      msg.textContent = '✅ 이메일을 발송했습니다. 받은편지함을 확인하세요.';
      btn.textContent = '전송 완료';
    } else {
      const data = await res.json();
      msg.style.color = '#c0392b';
      msg.textContent = data.detail || '등록된 이메일을 찾을 수 없습니다.';
      btn.disabled = false;
      btn.textContent = '복구 이메일 받기';
    }
  } catch (e) {
    msg.style.display = 'block';
    msg.style.color = '#c0392b';
    msg.textContent = '오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
    btn.disabled = false;
    btn.textContent = '복구 이메일 받기';
  }
}
</script>
</body>
</html>
